name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - "arenabuddy/server/**"
      - "arenabuddy/core/**"
      - "arenabuddy/data/**"
      - "lib/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

env:
  ECR_REPOSITORY: arenabuddy-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
      registry: ${{ steps.build.outputs.registry }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f arenabuddy/server/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "registry=$ECR_REGISTRY" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        env:
          SERVER_IMAGE: ${{ needs.build-and-push.outputs.image }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.registry }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: SERVER_IMAGE,ECR_REGISTRY
          script: |
            set -e
            source /root/.env

            # Login to ECR
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # Update repo and pull new image
            cd /root/code/monorepo
            git pull --ff-only origin main

            # Deploy
            cd arenabuddy/server
            export SERVER_IMAGE="$SERVER_IMAGE"
            docker compose pull server
            docker compose up -d --remove-orphans

            # Clean up old images
            docker image prune -f
