name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "arenabuddy/server/**"
      - "arenabuddy/web/**"
      - "arenabuddy/core/**"
      - "arenabuddy/data/**"
      - "lib/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: arenabuddy/server/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/arenabuddy-server:latest
            ${{ steps.login-ecr.outputs.registry }}/arenabuddy-server:${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: arenabuddy/web/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/arenabuddy-web:latest
            ${{ steps.login-ecr.outputs.registry }}/arenabuddy-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    runs-on: ubuntu-latest
    needs: [build-server, build-web]
    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            source /root/.env

            IMAGE_TAG="${{ github.sha }}"

            # Discover ECR registry from AWS
            ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${AWS_REGION}.amazonaws.com
            SERVER_IMAGE="$ECR_REGISTRY/arenabuddy-server:$IMAGE_TAG"
            WEB_IMAGE="$ECR_REGISTRY/arenabuddy-web:$IMAGE_TAG"

            # Login to ECR
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # Update repo and pull new images
            cd /root/code/monorepo
            git pull --ff-only origin main

            # Deploy
            cd arenabuddy/server
            export SERVER_IMAGE="$SERVER_IMAGE"
            export WEB_IMAGE="$WEB_IMAGE"
            docker compose pull server web
            docker compose up -d --remove-orphans

            # Clean up old images
            docker image prune -f
