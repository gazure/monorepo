services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: arenabuddy
      POSTGRES_USER: arenabuddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arenabuddy"]
      interval: 5s
      timeout: 5s
      retries: 5

  tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo

  server:
    image: ${SERVER_IMAGE:-arenabuddy-server:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      tempo:
        condition: service_started
    environment:
      DATABASE_URL: postgres://arenabuddy:${POSTGRES_PASSWORD}@postgres/arenabuddy
      LISTEN_ADDR: 0.0.0.0:50051
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317

  web:
    image: ${WEB_IMAGE:-arenabuddy-web:latest}
    restart: unless-stopped
    expose:
      - "8080"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - server
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      - tempo
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SERVER_HTTP_PORT: "3000"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  tempo_data:
  grafana_data:
